<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Login</title>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🔥 REAL 4K TRAVEL VIDEO -->
<video autoplay muted loop playsinline>
  <source src="video_20260323_154429_edit.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="container">
  <div class="login-box">
    <h2>Travel Login ✈️</h2>

    <form id="loginForm">
      <div class="input-box">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email"placeholder="Email" required>
      </div>

      <div class="input-box">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <button class="btn" type="submit">Login</button>
    </form>

    <div class="extra"> 
      <p>Forgot Password? <a href="/password/index.html">Click here</a></p>
      <p>New user? <a href="/signup/index.html">Create Account</a></p>
    </div>
    <div id="msg"></div>
  </div>
  
</div>
<script src="script.js"> </script>
</body>
</html>
